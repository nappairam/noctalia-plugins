id = "nappairam/globalprotect-vpn"
name = "GlobalProtect VPN"
version = "2.0.0"
min_noctalia = "5.0.0"
author = "Mariappan Ramasamy"
license = "MIT"
description = "GlobalProtect VPN connection toggle with status indicator"
icon = "shield"
tags = ["Network", "Bar", "VPN"]

[[widget]]
id = "globalprotect-vpn"
entry = "main.luau"

[[widget.setting]]
key = "portal"
type = "string"
label = "Portal"
description = "GlobalProtect portal hostname (e.g. vpn.example.com). Empty falls back to $NOCTALIA_GPCLIENT_PORTAL."
default = ""

[[widget.setting]]
key = "gateway"
type = "string"
label = "Gateway"
description = "Optional gateway override (-g flag). Empty for auto / $NOCTALIA_GPCLIENT_GATEWAY."
default = ""

[[widget.setting]]
key = "iface"
type = "string"
label = "Interface"
description = "Tunnel interface name. Empty falls back to $NOCTALIA_GPCLIENT_INTERFACE or gpd0."
default = "gpd0"

[[widget.setting]]
key = "default_route"
type = "bool"
label = "Default route via VPN"
description = "Run `sudo ip route replace default dev <iface>` while connected; removed on disconnect."
default = false
